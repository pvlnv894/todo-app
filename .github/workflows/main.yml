name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven
          
      - name: Build with Maven
        run: mvn clean package --no-transfer-progress

      - name: Run tests
        run: mvn test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-cd-jar
          path: target/ci-cd-0.0.1-SNAPSHOT.jar
          
  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-cd-jar
          path: target

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build --platform linux/amd64,linux/arm64 -t ${{ secrets.DOCKER_USERNAME }}/app:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/app:latest

  deploy:
    needs: build-and-push-docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VM via host machine
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 50000
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/app:latest
            docker stop app || true
            docker rm app || true
            docker run -d --name app -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/app:latest

  notify:
    needs: [build-and-test, build-and-push-docker, deploy]
    runs-on: ubuntu-latest
    if: ${{ needs.build-and-test.result == 'success' &&
            needs.build-and-push-docker.result == 'success' &&
            needs.deploy.result == 'success' }}
  
    steps:
      - name: Notify success
        run: echo "CI/CD SUCCESS"
